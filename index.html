<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ScaleWise">
    <title>ScaleWise Converter</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <a class="brand" href="index.html" aria-label="ScaleWise home">
          <img src="assets/icon.svg" alt="" width="42" height="42">
          <span>
            <strong>ScaleWise</strong>
            <small>Conversion table and calculator</small>
          </span>
        </a>
      </header>

      <main>
        <section class="hero" aria-labelledby="app-title">
          <div>
            <p class="eyebrow">iPhone and iPad ready</p>
            <h1 id="app-title">Convert measurements without hunting through tables.</h1>
          </div>
          <div class="quick-stat" aria-label="Supported measurement types">
            <span id="unit-count">0</span>
            <small>units</small>
          </div>
        </section>

        <nav class="tabs" aria-label="Conversion modes">
          <button class="tab active" type="button" data-view="calculator" aria-selected="true">Calculator</button>
          <button class="tab" type="button" data-view="table" aria-selected="false">Table</button>
        </nav>

        <section class="panel active" id="calculator-panel" data-panel="calculator" aria-label="Conversion calculator">
          <div class="field">
            <label for="category">Measurement</label>
            <select id="category"></select>
          </div>

          <div class="converter-grid">
            <div class="field">
              <label for="from-unit">From</label>
              <select id="from-unit"></select>
            </div>
            <button class="icon-button" id="swap-units" type="button" aria-label="Swap units" title="Swap units">
              <span aria-hidden="true">⇄</span>
            </button>
            <div class="field">
              <label for="to-unit">To</label>
              <select id="to-unit"></select>
            </div>
          </div>

          <div class="calculator-card">
            <label for="input-value">Value</label>
            <input id="input-value" type="number" inputmode="decimal" step="any" value="1">
            <div class="result" aria-live="polite">
              <span id="result-value">1</span>
              <small id="result-unit">unit</small>
            </div>
          </div>

          <div class="all-results" id="all-results" aria-label="Equivalent values"></div>
        </section>

        <section class="panel" id="table-panel" data-panel="table" aria-label="Conversion table">
          <div class="table-toolbar">
            <div class="field compact">
              <label for="table-base">Base unit</label>
              <select id="table-base"></select>
            </div>
            <div class="field compact">
              <label for="table-start">Start</label>
              <input id="table-start" type="number" inputmode="decimal" step="any" value="1">
            </div>
            <div class="field compact">
              <label for="table-step">Step</label>
              <input id="table-step" type="number" inputmode="decimal" step="any" value="1">
            </div>
            <div class="field compact">
              <label for="table-rows">Rows</label>
              <input id="table-rows" type="number" inputmode="numeric" min="1" max="50" step="1" value="10">
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </body>
</html>
